# Theme Configuration
name: whale
author: Jarod
version: 2.0.0
description: "一个独立开发者风格的暗色终端主题 — whale"

# 主题设置
theme:
  # 站点标题（覆盖 config 中的 title）
  title: " ~/whale"
  # 站点描述
  subtitle: "独立开发者的思考沉淀"
  # 站点 URL
  url: localhost:4000

  # 主题色
  colors:
    bg: "#0a0a0a"
    bgCard: "#161616"
    accent: "#d946ef"
    accent2: "#ec4899"
    link: "#7dd3fc"

  # 导航菜单 (key: url)
  menu:
    归档: /archives
    随笔: /categories/随笔
    项目: /projects
    友链: /friends
    关于: /about
    RSS: /atom.xml

  # 社交链接
  social:
    github: "https://github.com/jarodvip"
    twitter: "https://twitter.com/jarodvip"
    email: "mailto:hi@whale.dev"

  # Hero 区域
  hero:
    name: Jarod
    tagline: "一个独立开发者的<br/>思考沉淀 · 工具实验 · 折腾记录"
    bio: '我是 **Jarod**。这里记录我写代码、做产品、写文字的过程。不追风口，不接软广，只写我真正在用的东西和真正想明白的事。'
    terminal:
      whoami: "Jarod / indie hacker / 写代码的"
      facts:
        - "· 做了 12 个 side project"
        - "· 写了 86 篇文章，约 18 万字"
        - "· 在用：Next.js · Rust · SwiftUI"
        - "· 邮箱：hi@whale.dev"

  # 数据条
  stats:
    - label: "$ ls articles | wc -l"
      value: "86"
      desc: "已发布文章"
    - label: "$ git log --author | wc -l"
      value: "2,341"
      desc: "累计 commit"
    - label: "$ curl followers"
      value: "4,127"
      desc: "RSS 订阅者"
    - label: "$ last update"
      value: "2d"
      desc: "距上次更新"

  # 运作方式
  howItWorks:
    enabled: true
    title: "HOW IT WORKS"
    items:
      - order: "01 / write"
        title: "写代码"
        desc: "每周一个 side project，写完开源或上线。代码即笔记，PR 即日记。"
      - order: "02 / write"
        title: "写文字"
        desc: "每月 2-3 篇长文。只写自己踩过坑、用过半年以上、复购过的东西。"
      - order: "03 / share"
        title: "写工具"
        desc: "把重复三次以上的事做成工具。工具免费，作者保留署名权。"

  # 订阅
  subscribe:
    enabled: true
    title: "把更新送到你的收件箱"
    desc: "每月一封信。包含当月文章、做过的小工具、和一些不打算发到外面的话。没有追踪，没有广告，可以一键退订。"
    emailPlaceholder: "you@example.com"

  # Footer
  footer:
    copy: "© 2024-2026 Jarod · made with love & `echo`"

# 文章配置
post:
  # 文章目录
  toc: true
  # 每页文章数
  per_page: 10
  # 文章阅读时间
  reading_time: true

# 主题自定义 CSS/JS
custom:
  css:
    - //fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600;700&display=swap
    - //cdn.jsdelivr.net/npm/geist-font@1.3.0/dist/geist.min.css
  js: []
